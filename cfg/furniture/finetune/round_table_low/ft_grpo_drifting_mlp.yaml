defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.grpo.train_grpo_drifting_agent.TrainGRPODriftingAgent

name: ${env_name}_ft_grpo_drifting_mlp_ta${horizon_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/furniture/finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_seed${seed}
base_policy_path: null

seed: 42
device: cuda:0
env_name: ${env.specific.furniture}_${env.specific.randomness}_dim
obs_dim: 44
action_dim: 10
cond_steps: 1
horizon_steps: 8
act_steps: 8

# GRPO parameters
batch_size: 256
n_train_itr: 1000
n_steps: ${eval:'round(${env.max_episode_steps} / ${act_steps})'}
log_freq: 5
save_model_freq: 50

train:
  group_size: 16
  grpo_lr: 1e-5
  update_epochs: 4
  grpo_batch_size: 256
  kl_beta: 0.05
  kl_beta_min: 0.001
  kl_beta_decay: 0.995
  use_homogeneous_reset: true
  verbose: true

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-furniture-${env.specific.furniture}-${env.specific.randomness}-finetune
  run: ${now:%H-%M-%S}_${name}_grpo
  offline_mode: false

model:
  _target_: model.drifting.ft_grpo.grpodrifting.GRPODrifting
  actor_policy_path: ${base_policy_path}
  device: ${device}
  epsilon: 0.2
  beta: 0.05

env:
  n_envs: 1000
  name: ${env_name}
  env_type: furniture
  max_episode_steps: 1000
  best_reward_threshold_for_success: 2
  specific:
    headless: true
    furniture: round_table
    randomness: low
    normalization_path: ${oc.env:REINFLOW_DATA_DIR}/furniture/${env.specific.furniture}_${env.specific.randomness}/normalization.pth
    obs_steps: ${cond_steps}
    act_steps: ${act_steps}
    sparse_reward: true
