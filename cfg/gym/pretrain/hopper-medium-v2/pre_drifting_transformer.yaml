######################################################################
# environment and task
env_suite: gym
env: hopper-medium-v2

# future action forecasts
action_dim: 3
horizon_steps: 4

# observation history
obs_dim: 11
cond_steps: 1
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.pretrain.train_drifting_agent.TrainDriftingAgent
name: ${env}_pre_drifting_transformer_ta${horizon_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/gym/pretrain/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
train_dataset_path: ${oc.env:REINFLOW_DATA_DIR}/gym/${env}/train.npz
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/gym/${env}/normalization.npz
use_d4rl_dataset: true

batch_size: 128
seed: 42
device: cuda:0
test_in_mujoco: true
auto_resume: true
max_n_episodes: -1
wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-gym-${env}-pretrain
  run: ${now:%H-%M-%S}_${name}

train:
  n_epochs: 40
  batch_size: ${batch_size}
  learning_rate: 1e-3
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 40
    warmup_steps: 5
    min_lr: 1e-4
  save_model_freq: 10
  test_freq: 10

model:
  _target_: model.drifting.drifting.DriftingPolicy
  network:
    _target_: model.drifting.backbone.transformer_for_drifting.TransformerForDrifting
    input_dim: ${action_dim}
    output_dim: ${action_dim}
    horizon: ${horizon_steps}
    n_obs_steps: ${cond_steps}
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    n_layer: 4
    n_head: 4
    n_emb: 256
    p_drop_emb: 0.1
    p_drop_attn: 0.1
    causal_attn: true
    time_as_cond: false
    obs_as_cond: true
  device: ${device}
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  max_denoising_steps: 1  # Drifting Policy is 1-NFE
  seed: ${seed}
  drift_coef: 0.1
  neg_drift_coef: 0.05
  mask_self: false

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  device: ${device}
  max_n_episodes: ${max_n_episodes}
