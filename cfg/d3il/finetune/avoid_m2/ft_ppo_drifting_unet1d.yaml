######################################################################
env_name: avoiding-m5
mode: d57_r12 # M2, desired modes 5 and 7, required modes 1 and 2
obs_dim: 4
action_dim: 2
horizon_steps: 4
act_steps: 4
cond_steps: 1
denoising_steps: 1  # Drifting Policy is 1-NFE
ft_denoising_steps: 1
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.reinflow.train_ppo_drifting_agent.TrainPPODriftingAgent
name: ${env_name}_m2_ft_ppo_drifting_unet1d_ta${horizon_steps}_seed${seed}
logdir: ${oc.env:REINFLOW_LOG_DIR}/d3il-finetune/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path:       # specify path to pre-trained drifting model
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/d3il/avoid_m2/normalization.npz

seed: 42
device: cuda:0
sim_device: cuda:0
min_std: 0.05
max_std: 0.12
env:
  n_envs: 50
  name: ${env_name}
  max_episode_steps: 100
  reset_at_iteration: false
  save_video: false
  best_reward_threshold_for_success: 2
  wrappers:
    d3il_lowdim:
      normalization_path: ${normalization_path}
      mode: ${mode}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: true
wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-d3il-${env_name}-finetune
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false
train:
  n_train_itr: 51
  n_critic_warmup_itr: 2
  n_steps: 100
  gamma: 0.99
  actor_lr: 3.0e-06
  actor_weight_decay: 0
  actor_lr_scheduler:
    type: cosine
    first_cycle_steps: 50
    warmup_steps: 5
    min_lr: 3.0e-06
  critic_lr: 4.5e-4
  critic_weight_decay: 1.0e-05
  critic_lr_scheduler:
    type: cosine
    first_cycle_steps: 50
    warmup_steps: 10
    min_lr: 3e-4
  save_model_freq: 10
  val_freq: 5
  render:
    freq: 1
    num: 0
  reward_scale_running: true
  reward_scale_const: 1.0
  gae_lambda: 0.95
  batch_size: ${eval:'round(25/2)'}
  update_epochs: 10
  vf_coef: 0.5
  ent_coef: 0.01
  target_kl: 0.01
  lr_schedule: fixed
  repeat_samples: true
  verbose: false
  clip_intermediate_actions: true
  account_for_initial_stochasticity: true
  max_noise_hold_ratio: 0.35
  max_noise_decay_ratio: 0.7
  max_grad_norm: 25.0
  use_bc_loss: true
  bc_loss_type: W2
  bc_loss_coeff: 0.05
model:
  _target_: model.drifting.ft_ppo.ppodrifting.PPODrifting
  device: ${device}
  actor_policy_path: ${base_policy_path}
  policy:
    _target_: model.drifting.backbone.conditional_unet1d.ConditionalUnet1D
    input_dim: ${action_dim}
    global_cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    down_dims:
      - 256
      - 512
      - 1024
    kernel_size: 5
    n_groups: 8
    cond_predict_scale: true
  critic:
    _target_: model.common.critic.CriticObs
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    mlp_dims: [256, 256, 256]
    activation_type: Mish
    residual_style: true
  act_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  cond_steps: ${cond_steps}
  noise_scheduler_type: learn
  inference_steps: ${denoising_steps}
  ft_denoising_steps: ${ft_denoising_steps}
  randn_clip_value: 3
  min_sampling_denoising_std: ${min_std}
  min_logprob_denoising_std: ${min_std}
  max_logprob_denoising_std: ${max_std}
  logprob_min: -1.0
  logprob_max: 1.0
  clip_ploss_coef: 0.01
  clip_ploss_coef_base: 0.001
  clip_ploss_coef_rate: 3
  clip_vloss_coef:
  denoised_clip_value: 1.0
  time_dim_explore: 16
  learn_explore_time_embedding: true
  use_time_independent_noise: true
  noise_hidden_dims: [256, 256, 256]
  logprob_debug_sample: false
  logprob_debug_recalculate: false
  explore_net_activation_type: Tanh
