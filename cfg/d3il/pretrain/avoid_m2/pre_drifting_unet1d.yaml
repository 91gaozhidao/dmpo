######################################################################
env: avoid
mode: d57_r12 # M2, desired modes 5 and 7, required modes 1 and 2
obs_dim: 4
action_dim: 2
horizon_steps: 4
cond_steps: 1
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.pretrain.train_drifting_agent.TrainDriftingAgent
name: ${env}_d57_r12_pre_drifting_unet1d_ta${horizon_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/d3il-pretrain/m2/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
train_dataset_path: ${oc.env:REINFLOW_DATA_DIR}/d3il/avoid_m2/train.npz
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/d3il/avoid_m2/normalization.npz

batch_size: 256
seed: 42
device: cuda:0
test_in_mujoco: false
max_n_episodes: -1
wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-d3il-${env}-pretrain
  run: ${now:%H-%M-%S}_${name}

train:
  n_epochs: 10000
  batch_size: ${batch_size}
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 10000
    warmup_steps: 100
    min_lr: 1e-5
  save_model_freq: 1000
  log_freq: 100

model:
  _target_: model.drifting.drifting.DriftingPolicy
  network:
    _target_: model.drifting.backbone.conditional_unet1d.ConditionalUnet1D
    input_dim: ${action_dim}
    global_cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    down_dims:
      - 256
      - 512
      - 1024
    kernel_size: 5
    n_groups: 8
    cond_predict_scale: true
  device: ${device}
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  max_denoising_steps: 1  # Drifting Policy is 1-NFE
  seed: ${seed}
  drift_coef: 0.1
  neg_drift_coef: 0.05
  mask_self: false

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  cond_steps: ${cond_steps}
  device: ${device}
  max_n_episodes: ${max_n_episodes}
