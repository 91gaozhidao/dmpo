######################################################################
# environment and task
env_suite: robomimic
env: can

# future action forecasts
action_dim: 7
horizon_steps: 4

# observation history
obs_dim: 9  # proprioception only
cond_steps: 1
img_cond_steps: 1

# observation shape
shape_meta:
  obs:
    rgb:
      shape: [3, 96, 96]
    state:
      shape: [9]
  action:
    shape: [7]
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.pretrain.train_drifting_agent.TrainDriftingAgent
name: ${env}_pre_drifting_unet1d_img_ta${horizon_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/pretrain/${env}/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
train_dataset_path: ${oc.env:REINFLOW_DATA_DIR}/robomimic/${env}-img/train.npz
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/robomimic/${env}-img/normalization.npz
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env}-img.json

batch_size: 256
seed: 42
device: cuda:0
test_in_mujoco: false
max_n_episodes: -1
wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-robomimic-${env}-pretrain
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}_drifting
  offline_mode: false

eval_env:
  n_envs: 10
  n_steps: 300
  max_episode_steps: 300
  best_reward_threshold_for_success: 1
  use_image_obs: true
  wrappers:
    robomimic_image:
      normalization_path: ${normalization_path}
      low_dim_keys: ['robot0_eef_pos', 'robot0_eef_quat', 'robot0_gripper_qpos']
      image_keys: ['robot0_eye_in_hand_image']
      shape_meta: ${shape_meta}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${horizon_steps}
      max_episode_steps: ${eval_env.max_episode_steps}
      reset_within_step: true

train:
  n_epochs: 2000
  batch_size: ${batch_size}
  learning_rate: 1e-4
  weight_decay: 1e-6
  lr_scheduler:
    first_cycle_steps: 2000
    warmup_steps: 100
    min_lr: 1e-5
  epoch_start_ema: 20
  update_ema_freq: 10
  save_model_freq: 100
  log_freq: 25

model:
  _target_: model.drifting.drifting.DriftingPolicy
  network:
    _target_: model.drifting.backbone.vit_wrapper.DriftingViTWrapper
    core_network:
      _target_: model.drifting.backbone.conditional_unet1d.ConditionalUnet1D
      input_dim: ${action_dim}
      global_cond_dim: ${eval:'${model.network.visual_feature_dim} + ${model.network.cond_dim}'}
      down_dims:
        - 256
        - 512
        - 1024
    vision_encoder:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      num_channel: ${eval:'${shape_meta.obs.rgb.shape[0]} * ${img_cond_steps}'}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    spatial_emb: 128
    visual_feature_dim: 128
    dropout: 0.1
  device: ${device}
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  max_denoising_steps: 1  # Drifting Policy is 1-NFE
  seed: ${seed}
  drift_coef: 0.1
  neg_drift_coef: 0.05
  mask_self: false

ema:
  decay: 0.995

train_dataset:
  _target_: agent.dataset.sequence.StitchedSequenceDataset
  use_img: true
  dataset_path: ${train_dataset_path}
  horizon_steps: ${horizon_steps}
  max_n_episodes: ${max_n_episodes}
  cond_steps: ${cond_steps}
  img_cond_steps: ${img_cond_steps}
  device: ${device}
