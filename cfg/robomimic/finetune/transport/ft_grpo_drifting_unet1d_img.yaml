######################################################################
env_suite: robomimic
env_name: transport

# future action forecasts
action_dim: 14
horizon_steps: 8

# observation history
obs_dim: 18
cond_steps: 1
img_cond_steps: 1

# observation shape
shape_meta:
  obs:
    rgb:
      shape: [6, 96, 96]
    state:
      shape: [18]
  action:
    shape: [14]
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.grpo.train_grpo_drifting_agent.TrainGRPODriftingAgent
name: ${env_name}_ft_grpo_drifting_unet1d_img
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/finetune/${env_name}/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path:

# GRPO parameters
batch_size: 256
seed: 42
device: cuda:0
n_train_itr: 1000
n_steps: 400 # per group
log_freq: 5
save_model_freq: 50

train:
  group_size: 16
  grpo_lr: 1e-5
  update_epochs: 4
  grpo_batch_size: 256
  kl_beta: 0.05
  kl_beta_min: 0.001
  kl_beta_decay: 0.995
  use_homogeneous_reset: true
  verbose: true

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-robomimic-${env_name}-finetune
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}_grpo
  offline_mode: false

model:
  _target_: model.drifting.ft_grpo.grpodrifting.GRPODrifting
  actor_policy_path: ${base_policy_path}
  device: ${device}
  epsilon: 0.2
  beta: 0.05

env:
  _target_: env.gym_utils.make_async
  env_name: ${env_name}
  env_type: ${env_suite}
  n_envs: 25
  max_episode_steps: 700
  wrappers:
    robomimic_image:
      _target_: env.gym_utils.wrapper.robomimic_image.RobomimicImageWrapper
      shape_meta: ${shape_meta}
    multi_step:
      _target_: env.gym_utils.wrapper.multi_step.MultiStepWrapper
      n_obs_steps: ${cond_steps}
      n_action_steps: ${horizon_steps}
      max_episode_steps: 700
