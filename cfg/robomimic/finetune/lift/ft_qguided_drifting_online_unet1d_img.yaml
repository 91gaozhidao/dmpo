    rgb:
      shape: [3, 96, 96]
    state:
      shape: [9]
  action:
    shape: [7]
low_dim_keys:
  - robot0_eef_pos
  - robot0_eef_quat
  - robot0_gripper_qpos
image_keys:
  - robot0_eye_in_hand_image
