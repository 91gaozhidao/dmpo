# @package _global_
defaults:
  - /templates/ft_qguided_drifting_online_robomimic_unet1d_img
  - _self_
hydra:
  searchpath:
    - file://${oc.env:REINFLOW_DIR}/cfg
env_name: lift
obs_dim: 9
cond_steps: 1
img_cond_steps: 1
action_dim: 7
