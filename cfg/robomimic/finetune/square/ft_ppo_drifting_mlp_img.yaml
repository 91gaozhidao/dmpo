######################################################################
# environment and task
env_suite: robomimic
env_name: square

# future action forecasts
action_dim: 7
horizon_steps: 4

# observation history
obs_dim: 9  # proprioception only
cond_steps: 1
img_cond_steps: 1

# observation shape
shape_meta:
  obs:
    rgb:
      shape: [3, 96, 96]
    state:
      shape: [9]
  action: 
    shape: [7]
###################################################################

defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.reinflow.train_ppo_drifting_agent.TrainPPODriftingAgent
name: ${env_name}_ft_ppo_drifting_mlp_img
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/finetune/${env_name}/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path: null # specify path to pre-trained model

# RL parameters
batch_size: 256
seed: 42
device: cuda:0
n_train_itr: 1000
n_steps: 2000
update_epochs: 4
grad_accumulate: 1
max_grad_norm: 1.0

wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-robomimic-${env_name}-finetune
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false

train:
  learning_rate: 1e-5
  weight_decay: 1e-6
  save_model_freq: 50
  log_freq: 10
  verbose: true

model:
  _target_: model.drifting.ft_ppo.ppodrifting.PPODrifting
  actor_policy_path: ${base_policy_path}
  critic:
    _target_: model.common.critic.Critic
    obs_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    action_dim: ${eval:'${action_dim} * ${horizon_steps}'}
    hidden_dims: [512, 512, 512]
  device: ${device}
  horizon_steps: ${horizon_steps}
  action_dim: ${action_dim}
  obs_dim: ${obs_dim}
  epsilon: 0.2
  vf_coef: 0.5
  ent_coef: 0.01

env:
  _target_: env.gym_utils.make_async
  env_name: ${env_name}
  env_type: ${env_suite}
  n_envs: 16
  max_episode_steps: 400
  wrappers:
    robomimic_image:
      _target_: env.gym_utils.wrapper.robomimic_image.RobomimicImageWrapper
      shape_meta: ${shape_meta}
    multi_step:
      _target_: env.gym_utils.wrapper.multi_step.MultiStepWrapper
      n_obs_steps: ${cond_steps}
      n_action_steps: ${horizon_steps}
      max_episode_steps: 400
