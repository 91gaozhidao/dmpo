# @package _global_
######################################################################
env_suite: robomimic
######################################################################
defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.drifting.train_qguided_drifting_agent.TrainQGuidedDriftingAgent
name: ${env_name}_ft_qguided_drifting_online_unet1d_img_ta${horizon_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/robomimic/finetune/${env_name}/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path:
offline_dataset_path: null
robomimic_env_cfg_path: cfg/robomimic/env_meta/${env_name}-img.json
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/robomimic/${env_name}-img/normalization.npz
seed: 42
device: cuda:0
sim_device: cuda:0
env:
  n_envs: 8
  name: ${env_name}
  best_reward_threshold_for_success: 1
  max_episode_steps: ${max_episode_steps}
  save_video: false
  use_image_obs: true
  wrappers:
    robomimic_image:
      normalization_path: ${normalization_path}
      low_dim_keys: ${low_dim_keys}
      image_keys: ${image_keys}
      shape_meta: ${shape_meta}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: true
wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-robomimic-${env_name}-qguided-drifting-online
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false
train:
  n_train_itr: 400
  n_steps: 10
  n_steps_eval: 500
  n_critic_warmup_itr: 40
  min_replay_size: 1024
  gamma: 0.999
  actor_lr: 3.0e-6
  actor_weight_decay: 0
  actor_lr_scheduler:
    first_cycle_steps: 400
    warmup_steps: 25
    min_lr: 1.0e-6
  critic_lr: 3.0e-4
  critic_weight_decay: 0
  critic_lr_scheduler:
    first_cycle_steps: 400
    warmup_steps: 25
    min_lr: 1.0e-4
  save_model_freq: 50
  val_freq: 20
  render:
    freq: 1
    num: 0
  log_freq: 10
  batch_size: 128
  target_ema_rate: 0.005
  scale_reward_factor: 1.0
  buffer_size: 200000
  offline_batch_ratio: 0.0
  offline_only_iters: 0
  updates_per_itr: 8
  offline_cache_batch_size: 512
  max_grad_norm: 10.0
shape_meta: {}
low_dim_keys: []
image_keys: []
model:
  _target_: model.drifting.ft_qguided.qguided_drifting.QGuidedDrifting
  device: ${device}
  actor_policy_path: ${base_policy_path}
  policy:
    _target_: model.drifting.backbone.vit_wrapper.DriftingViTWrapper
    core_network:
      _target_: model.drifting.backbone.conditional_unet1d.ConditionalUnet1D
      input_dim: ${action_dim}
      global_cond_dim: ${eval:'${model.policy.visual_feature_dim} + ${model.policy.cond_dim}'}
      down_dims: [256, 512, 1024]
      kernel_size: 5
      n_groups: 8
      cond_predict_scale: true
    vision_encoder:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      num_channel: ${eval:'${shape_meta.obs.rgb.shape[0]} * ${img_cond_steps}'}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    spatial_emb: 128
    visual_feature_dim: 128
    dropout: 0.1
  critic:
    _target_: model.common.critic.ViTCriticObsAct
    backbone:
      _target_: model.common.vit.VitEncoder
      obs_shape: ${shape_meta.obs.rgb.shape}
      num_channel: ${eval:'${shape_meta.obs.rgb.shape[0]} * ${img_cond_steps}'}
      cfg:
        patch_size: 8
        depth: 1
        embed_dim: 128
        num_heads: 4
        embed_style: embed2
        embed_norm: 0
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    action_dim: ${action_dim}
    action_steps: ${act_steps}
    img_cond_steps: ${img_cond_steps}
    mlp_dims: [256, 256, 256]
    activation_type: Mish
    residual_style: true
    spatial_emb: 128
    dropout: 0.0
    num_img: 1
    augment: true
    double_q: true
  act_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  act_steps: ${act_steps}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  cond_steps: ${cond_steps}
  seed: ${seed}
  temperatures: [0.1]
  num_action_samples: 8
  num_positive_samples: 2
  num_query_samples: 4
  sample_latent_scale: 1.0
  eval_latent_scale: 0.0
  reference_anchor_coeff: 0.05
offline_dataset: null
