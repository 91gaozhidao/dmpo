# @package _global_
######################################################################
env_suite: gym
######################################################################
defaults:
  - _self_
hydra:
  run:
    dir: ${logdir}
_target_: agent.finetune.drifting.train_qguided_drifting_agent.TrainQGuidedDriftingAgent
name: ${env_name}_ft_qguided_drifting_online_transformer_ta${horizon_steps}
logdir: ${oc.env:REINFLOW_LOG_DIR}/gym/finetune/${env_name}/${name}/${now:%Y-%m-%d}_${now:%H-%M-%S}_${seed}
base_policy_path:
offline_dataset_path: null
normalization_path: ${oc.env:REINFLOW_DATA_DIR}/gym/${env_name}/normalization.npz
seed: 42
device: cuda:0
sim_device: cuda:0
env:
  n_envs: 40
  name: ${env_name}
  max_episode_steps: ${max_episode_steps}
  reset_at_iteration: false
  save_video: false
  best_reward_threshold_for_success: ${best_reward_threshold_for_success}
  wrappers:
    mujoco_locomotion_lowdim:
      normalization_path: ${normalization_path}
    multi_step:
      n_obs_steps: ${cond_steps}
      n_action_steps: ${act_steps}
      max_episode_steps: ${env.max_episode_steps}
      reset_within_step: true
wandb:
  entity: ${oc.env:REINFLOW_WANDB_ENTITY}
  project: DM1-gym-${env_name}-qguided-drifting-online
  run: ${now:%Y-%m-%d}_${now:%H-%M-%S}_${name}
  offline_mode: false
train:
  n_train_itr: 1000
  n_steps: 1
  n_steps_eval: 500
  n_critic_warmup_itr: 80
  min_replay_size: 2048
  gamma: 0.99
  actor_lr: 1.0e-5
  actor_weight_decay: 0
  actor_lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 50
    min_lr: 1.0e-6
  critic_lr: 3.0e-4
  critic_weight_decay: 1.0e-5
  critic_lr_scheduler:
    first_cycle_steps: 1000
    warmup_steps: 50
    min_lr: 1.0e-4
  save_model_freq: 100
  val_freq: 20
  render:
    freq: 1
    num: 0
  log_freq: 10
  batch_size: 256
  target_ema_rate: 0.005
  scale_reward_factor: 1.0
  buffer_size: 1000000
  offline_batch_ratio: 0.0
  offline_only_iters: 0
  updates_per_itr: 8
  offline_cache_batch_size: 4096
  max_grad_norm: 10.0
model:
  _target_: model.drifting.ft_qguided.qguided_drifting.QGuidedDrifting
  device: ${device}
  actor_policy_path: ${base_policy_path}
  policy:
    _target_: model.drifting.backbone.transformer_for_drifting.TransformerForDrifting
    input_dim: ${action_dim}
    output_dim: ${action_dim}
    horizon: ${horizon_steps}
    n_obs_steps: ${cond_steps}
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    n_layer: 4
    n_head: 4
    n_emb: 256
    p_drop_emb: 0.1
    p_drop_attn: 0.1
    causal_attn: true
    time_as_cond: false
    obs_as_cond: true
  critic:
    _target_: model.common.critic.CriticObsAct
    cond_dim: ${eval:'${obs_dim} * ${cond_steps}'}
    mlp_dims: [256, 256, 256]
    action_dim: ${action_dim}
    action_steps: ${act_steps}
    activation_type: Mish
    residual_style: true
    double_q: true
  act_dim: ${action_dim}
  horizon_steps: ${horizon_steps}
  act_steps: ${act_steps}
  act_min: -1
  act_max: 1
  obs_dim: ${obs_dim}
  cond_steps: ${cond_steps}
  seed: ${seed}
  temperatures: [0.1]
  num_action_samples: 8
  num_positive_samples: 2
  num_query_samples: 4
  sample_latent_scale: 1.0
  eval_latent_scale: 0.0
  reference_anchor_coeff: 0.05
offline_dataset: null
